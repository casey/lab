network:
  name: lab

server:
  name: tulip.farm
  listeners:
    ":6697":
      tls:
        cert: /var/lib/acme/tulip.farm/fullchain.pem
        key: /var/lib/acme/tulip.farm/key.pem
  max-sendq: 96k
  sts:
    enabled: true

datastore:
  path: datastore.db

limits:
  nicklen: 32
  identlen: 20
  realnamelen: 150
  channellen: 64
  awaylen: 390
  kicklen: 390
  topiclen: 390
  monitor-entries: 100
  whowas-entries: 100
  chan-list-modes: 100
  registration-messages: 1024
  multiline:
    max-bytes: 4096
    max-lines: 100

oper-classes:
  admin:
    capabilities:
      - "kill"
      - "ban"
      - "nofakelag"
      - "relaymsg"
      - "vhosts"
      - "sajoin"
      - "samode"
      - "snomasks"
      - "roleplay"
      - "rehash"
      - "accreg"
      - "chanreg"
      - "history"
      - "defcon"
      - "massmessage"
      - "metadata"

opers:
  admin:
    class: admin
    password: "$2a$04$vDn27WG3XnLWD1EWE5llhOXXhd3iy/2vQLTkEvsveDG6kx.SNAqp2"

accounts:
  authentication-enabled: true
  registration:
    enabled: false
  require-sasl:
    enabled: true
  nick-reservation:
    enabled: true
    method: strict
    force-nick-equals-account: true
  multiclient:
    enabled: true
    allowed-by-default: true
    always-on: "enabled"
    auto-away: "enabled"

history:
  enabled: true
  channel-length: 4096
  client-length: 512
  autoresize-window: 30d
  autoreplay-on-join: 0
  chathistory-maxmessages: 1000
  znc-maxmessages: 2048
  restrictions:
    expire-time: 0
    query-cutoff: none
    grace-period: 1h
  retention:
    allow-individual-delete: true
    enable-account-indexing: false
  tagmsg-storage:
    default: false
    whitelist:
      - "+draft/react"
      - "+react"

metadata:
  enabled: true
  max-subs: 100
  max-keys: 100
  client-throttle:
    enabled: true
    duration: 2m
    max-attempts: 10
